kind = "web"
previewPath = "/"
title = "DesiPartyHub"
version = "1.0.0"
id = "artifacts/desipartyhub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25018

[services.development]
run = "pnpm --filter @workspace/desipartyhub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/desipartyhub", "run", "build" ]
publicDir = "artifacts/desipartyhub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25018"
BASE_PATH = "/"
